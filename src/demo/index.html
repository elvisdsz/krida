<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krida Demo</title>

    <!-- Resolve @mediapipe/tasks-vision for the browser ES module loader -->
    <script type="importmap">
    {
        "imports": {
            "@mediapipe/tasks-vision": "https://unpkg.com/@mediapipe/tasks-vision@0.10.32/vision_bundle.mjs"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: #fff;
        }
        h1 { margin-bottom: 16px; font-size: 1.1rem; letter-spacing: 3px; opacity: 0.6; }
        .container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
        }
        #webcam, #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #status { margin-top: 14px; font-size: 0.85rem; opacity: 0.5; }
    </style>
</head>
<body>
    <h1>KRIDA DEMO</h1>
    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <p id="status">Loading models…</p>
    <script type="module" src="./index.js"></script>
</body>
</html>
